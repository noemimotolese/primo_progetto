{% extends "base.html" %}

{% block content %}
    <h2>Registrazione<h2>

    <form method="post">
        {% csrf_token %} <!-- protegge da attacchi CSRF-->
        {{ form.as_p }}

        <button type="submit">Registrati</button>
    </form>

    <p>
    Hai già un account?
    <a href="{% url 'login' %}">Login</a>
    </p>
{% endblock %}
